version: 2
registries:
  github-private:
    type: git
    url: https://github.com
    username: x-access-token
    password: ${{secrets.COMPOSER_AUTH}}
updates:
  - package-ecosystem: "composer"
    directory: "/app"
    schedule:
      interval: "cron"
      cronjob: "35 11 * * *"
    allow:
      - dependency-name: "*/*"
    ignore:
      - dependency-name: "symfony/*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "doctrine/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "easycorp/*"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "league/*"
        update-types:
          - "version-update:semver-major"
    groups:
      symfony:
        patterns:
          - "symfony/*"
      doctrine:
        patterns:
          - "doctrine/*"
      other:
        patterns:
          - "easycorp/*"
          - "league/*"
